<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>🍽️ 美味餐厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #0f0f23; min-height: 100vh; color: #fff; padding-bottom: 80px; -webkit-font-smoothing: antialiased; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 12px 16px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(45deg, #e94560, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px; }
        .header-cart { position: relative; width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(45deg, #e94560, #ff6b6b); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); transition: transform 0.2s; }
        .header-cart:active { transform: scale(0.95); }
        .header-cart .count { position: absolute; top: -4px; right: -4px; background: #ffd700; color: #1a1a2e; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .category-scroll { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 12px 0; position: sticky; top: 68px; z-index: 999; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .category-list { display: flex; gap: 10px; padding: 0 16px; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .category-list::-webkit-scrollbar { display: none; }
        .category-item { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.3s; font-size: 14px; white-space: nowrap; scroll-snap-align: start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 6px; }
        .category-item:active { transform: scale(0.95); }
        .category-item.active { background: linear-gradient(45deg, #e94560, #ff6b6b); border-color: transparent; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); }
        .menu-section { padding: 16px; }
        .section-title { font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .menu-list { display: flex; flex-direction: column; gap: 16px; }
        .dish-card { background: rgba(255,255,255,0.03); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); display: flex; transition: all 0.3s; }
        .dish-card:active { background: rgba(255,255,255,0.06); }
        .dish-image { width: 110px; height: 110px; flex-shrink: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; overflow: hidden; }
        .dish-image img { width: 100%; height: 100%; object-fit: cover; }
        .dish-tag-img { position: absolute; top: 6px; left: 6px; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; background: rgba(255, 215, 0, 0.9); color: #1a1a2e; }
        .dish-info { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .dish-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dish-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
        .dish-footer { display: flex; justify-content: space-between; align-items: center; }
        .dish-price { font-size: 20px; font-weight: 700; color: #e94560; }
        .dish-price span { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 400; }
        .add-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(45deg, #e94560, #ff6b6b); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3); transition: all 0.2s; }
        .add-btn:active { transform: scale(0.9); }
        .quantity-control { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 4px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(233, 69, 96, 0.8); border: none; color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .qty-btn:active { transform: scale(0.9); }
        .qty-value { font-size: 15px; min-width: 20px; text-align: center; font-weight: 600; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 1000; backdrop-filter: blur(20px); }
        .cart-icon-wrap { position: relative; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #e94560, #ff6b6b); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); }
        .cart-icon-wrap .count { position: absolute; top: -4px; right: -4px; background: #ffd700; color: #1a1a2e; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .cart-info { flex: 1; min-width: 0; }
        .cart-total { font-size: 20px; font-weight: 700; color: #e94560; }
        .cart-tip { font-size: 11px; color: rgba(255,255,255,0.5); }
        .checkout-btn { padding: 12px 24px; background: linear-gradient(45deg, #e94560, #ff6b6b); border: none; border-radius: 24px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); transition: all 0.2s; }
        .checkout-btn:active { transform: scale(0.95); }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .drawer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: flex-end; }
        .drawer-overlay.active { display: flex; }
        .drawer { width: 100%; max-width: 420px; height: 100%; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .drawer-overlay.active .drawer { transform: translateX(0); }
        .drawer-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .drawer-header h3 { font-size: 18px; }
        .drawer-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 16px; }
        .drawer-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .drawer-item-thumb { width: 60px; height: 60px; border-radius: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
        .drawer-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .drawer-item-info { flex: 1; min-width: 0; }
        .drawer-item-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drawer-item-price { font-size: 13px; color: #e94560; }
        .drawer-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
        .drawer-summary { margin-bottom: 12px; }
        .drawer-summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: rgba(255,255,255,0.7); }
        .drawer-summary-row.total { font-size: 18px; font-weight: 700; color: #e94560; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
        .drawer-checkout { width: 100%; padding: 14px; background: linear-gradient(45deg, #e94560, #ff6b6b); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .drawer-empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); }
        .drawer-empty .icon { font-size: 60px; margin-bottom: 12px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: rgba(255,255,255,0.7); }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 15px; outline: none; transition: all 0.3s; font-family: inherit; -webkit-appearance: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #e94560; background: rgba(255,255,255,0.1); }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .order-detail { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; margin-bottom: 16px; }
        .order-detail-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .order-detail-item:last-child { border-bottom: none; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(45deg, #e94560, #ff6b6b); border: none; border-radius: 14px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); transition: all 0.2s; }
        .submit-btn:active { transform: scale(0.98); }
        .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.4); }
        .empty-state .icon { font-size: 80px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: rgba(255,255,255,0.6); }
        .empty-state p { font-size: 13px; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100px); padding: 12px 24px; border-radius: 50px; font-weight: 600; z-index: 4000; opacity: 0; transition: all 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-size: 14px; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-success { background: linear-gradient(45deg, #00b894, #00cec9); }
        .toast-error { background: linear-gradient(45deg, #ff4757, #ff6348); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo"><span>🍽️</span><span>美味餐厅</span></div>
            <button class="header-cart" onclick="openDrawer()">🛒<span class="count" id="headerCount" style="display:none">0</span></button>
        </div>
    </header>
    <div class="category-scroll"><div class="category-list" id="categoryList"></div></div>
    <main class="menu-section" id="menuSection">
        <h2 class="section-title" id="sectionTitle">🍱 全部菜品</h2>
        <div class="menu-list" id="menuList"></div>
    </main>
    <div class="bottom-bar" id="bottomBar">
        <div class="cart-icon-wrap" onclick="openDrawer()">🛒<span class="count" id="bottomCount" style="display:none">0</span></div>
        <div class="cart-info"><div class="cart-total" id="bottomTotal">¥0</div><div class="cart-tip" id="bottomTip">购物车是空的</div></div>
        <button class="checkout-btn" id="bottomCheckout" onclick="openDrawer()" disabled>去结算</button>
    </div>
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
        <div class="drawer" onclick="event.stopPropagation()">
            <div class="drawer-header"><h3>🛒 购物车</h3><button class="drawer-close" onclick="closeDrawer()">×</button></div>
            <div class="drawer-body" id="drawerBody"><div class="drawer-empty"><div class="icon">🛒</div><p>购物车是空的</p><p style="font-size: 12px; margin-top: 4px;">快去挑选美味吧~</p></div></div>
            <div class="drawer-footer" id="drawerFooter" style="display:none">
                <div class="drawer-summary"><div class="drawer-summary-row"><span>商品小计</span><span id="drawerSubtotal">¥0</span></div><div class="drawer-summary-row"><span>配送费</span><span id="drawerDelivery">¥0</span></div><div class="drawer-summary-row total"><span>合计</span><span id="drawerTotal">¥0</span></div></div>
                <button class="drawer-checkout" onclick="openCheckout()">去结算</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="checkoutModal" onclick="closeCheckout(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header"><h3 class="modal-title">📋 确认订单</h3><button class="modal-close" onclick="closeCheckout()">×</button></div>
            <div id="orderDetail"></div>
            <div class="form-group"><label>👤 联系人姓名 *</label><input type="text" id="customerName" placeholder="请输入您的姓名"></div>
            <div class="form-group"><label>📞 联系电话 *</label><input type="tel" id="customerPhone" placeholder="请输入手机号码" inputmode="tel"></div>
            <div class="form-group"><label>📍 配送地址 *</label><textarea id="customerAddress" placeholder="请输入详细配送地址"></textarea></div>
            <div class="form-group"><label>📝 备注信息（选填）</label><textarea id="customerNote" placeholder="如有特殊要求请在此说明"></textarea></div>
            <button class="submit-btn" onclick="submitOrder()">✅ 确认下单</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const STORAGE_KEY = 'restaurant_menu_data';
        let categories = [], menuData = [], cart = {}, currentCategory = 'all';
        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) { const parsed = JSON.parse(data); categories = parsed.categories || []; menuData = parsed.menuData || []; }
        }
        function renderCategories() {
            const list = document.getElementById('categoryList');
            if (categories.length === 0) { list.innerHTML = '<div class="category-item">暂无分类</div>'; return; }
            let html = `<div class="category-item ${currentCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')">🍱 全部</div>`;
            categories.forEach(cat => { html += `<div class="category-item ${currentCategory === cat.id ? 'active' : ''}" onclick="filterCategory('${cat.id}')">${cat.emoji || '🍽️'} ${cat.name}</div>`; });
            list.innerHTML = html;
        }
        function filterCategory(category) {
            currentCategory = category; renderCategories(); renderMenu();
            const cat = categories.find(c => c.id === category);
            document.getElementById('sectionTitle').textContent = category === 'all' ? '🍱 全部菜品' : `${cat?.emoji || '🍽️'} ${cat?.name}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function renderMenu() {
            const list = document.getElementById('menuList');
            if (menuData.length === 0) { list.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div><h3>菜单准备中</h3><p>老板正在精心准备菜品，请稍后再来~</p></div>`; return; }
            const filtered = currentCategory === 'all' ? menuData : menuData.filter(item => item.category === currentCategory);
            if (filtered.length === 0) { list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>该分类暂无菜品</h3><p>看看其他分类吧~</p></div>`; return; }
            list.innerHTML = filtered.map(item => {
                const cat = categories.find(c => c.id === item.category) || { emoji: '🍽️' };
                const cartItem = cart[item.id]; const qty = cartItem ? cartItem.quantity : 0;
                const imageHtml = item.image ? `<img src="${item.image}" alt="${item.name}" loading="lazy">` : `<span style="font-size:40px">${cat.emoji}</span>`;
                const tagHtml = item.tag ? `<span class="dish-tag-img">${item.tag}</span>` : '';
                const addBtnHtml = qty > 0 ? `<div class="quantity-control"><button class="qty-btn" onclick="updateQty(${item.id}, -1, event)">−</button><span class="qty-value">${qty}</span><button class="qty-btn" onclick="updateQty(${item.id}, 1, event)">+</button></div>` : `<button class="add-btn" onclick="addToCart(${item.id}, event)">+</button>`;
                return `<div class="dish-card"><div class="dish-image">${imageHtml}${tagHtml}</div><div class="dish-info"><div><div class="dish-name">${item.name}</div><div class="dish-desc">${item.desc || '暂无描述'}</div></div><div class="dish-footer"><div class="dish-price">¥${item.price}<span>/份</span></div>${addBtnHtml}</div></div></div>`;
            }).join('');
        }
        function addToCart(dishId, event) { if (event) event.stopPropagation(); if (cart[dishId]) { cart[dishId].quantity++; } else { const dish = menuData.find(d => d.id === dishId); if (!dish) return; cart[dishId] = { ...dish, quantity: 1 }; } updateCart(); renderMenu(); showToast(`已添加 ${cart[dishId].name}`); }
        function updateQty(dishId, change, event) { if (event) event.stopPropagation(); if (cart[dishId]) { cart[dishId].quantity += change; if (cart[dishId].quantity <= 0) delete cart[dishId]; updateCart(); renderMenu(); updateDrawer(); } }
        function updateCart() {
            const items = Object.values(cart); const totalCount = items.reduce((sum, item) => sum + item.quantity, 0);
            const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0); const deliveryFee = subtotal >= 50 ? 0 : 5; const total = subtotal + deliveryFee;
            const headerCount = document.getElementById('headerCount'); headerCount.textContent = totalCount; headerCount.style.display = totalCount > 0 ? 'flex' : 'none';
            const bottomCount = document.getElementById('bottomCount'), bottomTotal = document.getElementById('bottomTotal'), bottomTip = document.getElementById('bottomTip'), bottomCheckout = document.getElementById('bottomCheckout');
            if (totalCount > 0) { bottomCount.textContent = totalCount; bottomCount.style.display = 'flex'; bottomTotal.textContent = `¥${total.toFixed(1)}`; bottomTip.textContent = deliveryFee === 0 ? '已免配送费' : `满¥50免配送费，还差¥${(50 - subtotal).toFixed(1)}`; bottomCheckout.disabled = false; bottomCheckout.textContent = '去结算'; bottomCheckout.onclick = openDrawer; }
            else { bottomCount.style.display = 'none'; bottomTotal.textContent = '¥0'; bottomTip.textContent = '购物车是空的'; bottomCheckout.disabled = true; bottomCheckout.textContent = '去结算'; bottomCheckout.onclick = openDrawer; }
        }
        function openDrawer() { updateDrawer(); document.getElementById('drawerOverlay').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeDrawer(event) { if (event && event.target !== event.currentTarget) return; document.getElementById('drawerOverlay').classList.remove('active'); document.body.style.overflow = ''; }
        function updateDrawer() {
            const body = document.getElementById('drawerBody'), footer = document.getElementById('drawerFooter'), items = Object.values(cart);
            if (items.length === 0) { body.innerHTML = `<div class="drawer-empty"><div class="icon">🛒</div><p>购物车是空的</p><p style="font-size: 12px; margin-top: 4px;">快去挑选美味吧~</p></div>`; footer.style.display = 'none'; return; }
            const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0); const deliveryFee = subtotal >= 50 ? 0 : 5; const total = subtotal + deliveryFee;
            body.innerHTML = items.map(item => { const cat = categories.find(c => c.id === item.category) || { emoji: '🍽️' }; const thumb = item.image ? `<img src="${item.image}" alt="${item.name}">` : `<span style="font-size:28px">${cat.emoji}</span>`; return `<div class="drawer-item"><div class="drawer-item-thumb">${thumb}</div><div class="drawer-item-info"><div class="drawer-item-name">${item.name}</div><div class="drawer-item-price">¥${item.price}</div></div><div class="quantity-control"><button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button><span class="qty-value">${item.quantity}</span><button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button></div></div>`; }).join('');
            document.getElementById('drawerSubtotal').textContent = `¥${subtotal.toFixed(1)}`; document.getElementById('drawerDelivery').textContent = deliveryFee === 0 ? '免配送费' : `¥${deliveryFee}`; document.getElementById('drawerTotal').textContent = `¥${total.toFixed(1)}`; footer.style.display = 'block';
        }
        function openCheckout() { closeDrawer(); const items = Object.values(cart); if (items.length === 0) return; const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0); const deliveryFee = subtotal >= 50 ? 0 : 5; const total = subtotal + deliveryFee;
            document.getElementById('orderDetail').innerHTML = `<div class="order-detail"><div class="order-detail-item" style="font-weight:600; margin-bottom:4px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:8px;"><span>📝 订单明细</span><span></span></div>${items.map(item => `<div class="order-detail-item"><span>${item.name} x${item.quantity}</span><span>¥${(item.price * item.quantity).toFixed(1)}</span></div>`).join('')}<div class="order-detail-item" style="border-top:1px solid rgba(255,255,255,0.1); margin-top:4px; padding-top:8px;"><span>配送费</span><span>${deliveryFee === 0 ? '免配送费' : '¥' + deliveryFee}</span></div><div class="order-detail-item" style="font-weight:700; font-size:15px; color:#e94560; margin-top:4px;"><span>合计</span><span>¥${total.toFixed(1)}</span></div></div>`;
            document.getElementById('checkoutModal').classList.add('active'); document.body.style.overflow = 'hidden';
        }
        function closeCheckout(event) { if (event && event.target !== event.currentTarget) return; document.getElementById('checkoutModal').classList.remove('active'); document.body.style.overflow = ''; }
        function submitOrder() {
            const name = document.getElementById('customerName').value.trim(), phone = document.getElementById('customerPhone').value.trim(), address = document.getElementById('customerAddress').value.trim();
            if (!name || !phone || !address) { showToast('请填写完整的联系信息', 'error'); return; }
            cart = {}; updateCart(); renderMenu(); closeCheckout(); showToast('✅ 下单成功！我们会尽快为您准备美食');
            document.getElementById('customerName').value = ''; document.getElementById('customerPhone').value = ''; document.getElementById('customerAddress').value = ''; document.getElementById('customerNote').value = '';
        }
        function showToast(message, type = 'success') { const toast = document.getElementById('toast'); toast.textContent = message; toast.className = `toast toast-${type}`; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }
        loadData(); renderCategories(); renderMenu(); updateCart();
    </script>
</body>
</html>
